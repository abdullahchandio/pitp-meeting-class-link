<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password"><br><br>

        <input type="submit" value="Submit" >
        <input type="reset" value="Reset" >
    </form>
    <script>
        const form = document.querySelector('form');
        form.addEventListener("submit",function(e){
            e.preventDefault();


        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        console.log('Name:', name);
        console.log('Email:', email);
        console.log('Password:', password);

        // input validation
            if(name === "" || email === "" || password === ""){
                alert("Please fill in all fields.");
            }else{
                alert("Form submitted successfully!");
            }


            const usernamePattern = /^[a-zA-Z0-9_-]{3,16}$/;
            if(!usernamePattern.test(name)){
                alert("Username is not valid!");
            }else{
                alert("Username is valid!");
            }



            // email validation with not allow temp mail
            const emailPattern = /^(?!.*@(?:yopmail\.com|tempmail\.com|mailinator\.com|mugstock\.com|guerrillamail\.com))[\w.%+-]+@[\w.-]+\.[a-zA-Z]{2,}$/;
            if(!emailPattern.test(email)){
                alert("Please enter a valid email address.");
            }else{
                alert("Email is valid!");
            }




            // password validation
            const passwordPattern = /^(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[a-zA-Z]).{8,}$/;
            if(!passwordPattern.test(password)){
                alert("Password is not valid!");
            }else{
                alert("Password is valid!");
            }
            // password validation with level (weak, medium, strong)
            if(password.length < 8){
                alert("Password is weak!");
            }else if(password.length >= 8 && password.length < 12){
                alert("Password is medium!");
            }else{
                Swal.fire({
  title: "Good job!",
  text: "Password is strong!",
  icon: "success",
  confirmButtonText: "OK"});
            
            }
        })
        </script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
