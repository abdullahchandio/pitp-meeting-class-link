        async function fetchData() {
            const request = await fetch("https://newsapi.org/v2/everything?q=pakistan&from=2026-03-21&sortBy=publishedAt&apiKey=63116482ea5b4993a1cf6d7ed6e5b76d")
            const data = await request.json();
             console.log(data);
            data.articles.forEach((elem)=>{
                document.getElementById("row").innerHTML += `
                <img src="${elem.urlToImage}" alt="" style="width: 500px; height: 250px;">
                <h5>${elem.title}</h5>
                <p>${elem.source.name}</p>
                `
            })
            }
